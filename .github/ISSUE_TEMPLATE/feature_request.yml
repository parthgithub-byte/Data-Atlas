name: Feature Request
description: Describe a new capability tied to user value and sprint outcomes.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What user or business problem are we solving?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired Outcome
      description: What should success look like?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Proposed Scope
      description: Keep this to the smallest valuable increment.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Add testable acceptance criteria.
    validations:
      required: true
